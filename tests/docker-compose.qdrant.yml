name: vecdb-dev

services:
  # Optional: integrated Ollama for dev testing
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Hidden local storage for development/testing
      # Warning: This is relative to the directory where this file is run!
      # We recommend running from project root: docker-compose -f tools/dev-qdrant.yml up
      - ../.qdrant_storage:/qdrant/storage

volumes:
  ollama:
