name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vecdb-x86_64-unknown-linux-gnu
            asset_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vecdb-x86_64-pc-windows-msvc
            asset_ext: ".exe"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: vecdb-aarch64-unknown-linux-gnu
            asset_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vecdb-aarch64-apple-darwin
            asset_ext: ""

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install system dependencies
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
          sudo dpkg --add-architecture arm64
          
          # Fix for Ubuntu 24.04 (Noble) which uses DEB822 format (.sources files)
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
          fi
          
          # Fix for older Ubuntu formats (.list files)
          if [ -f /etc/apt/sources.list ]; then
            sudo sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
          fi

          # Add ports.ubuntu.com for arm64
          OS_CODENAME=$(lsb_release -sc)
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $OS_CODENAME main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $OS_CODENAME-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $OS_CODENAME-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev:arm64
        else
          sudo apt-get update && sudo apt-get install -y libssl-dev
        fi

    - name: Build Release
      shell: bash
      run: |
        if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
          export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          export PKG_CONFIG_ALLOW_CROSS=1
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/
          export OPENSSL_INCLUDE_DIR=/usr/include/aarch64-linux-gnu
          export OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu
        fi
        cargo build --release --target ${{ matrix.target }}

    - name: Prepare Artifacts for Upload
      shell: bash
      run: |
        mkdir -p dist
        # Copy binaries
        cp target/${{ matrix.target }}/release/vecdb${{ matrix.asset_ext }} dist/
        cp target/${{ matrix.target }}/release/vecdb-server${{ matrix.asset_ext }} dist/
        cp target/${{ matrix.target }}/release/vecq${{ matrix.asset_ext }} dist/
        
        # Bundle Shared Libraries for Portable/RPATH support
        mkdir -p dist/lib
        # Find and copy libonnxruntime* from build artifacts to dist/lib
        find target/${{ matrix.target }}/release -name "libonnxruntime*${{ matrix.asset_ext }}*" -exec cp {} dist/lib/ \; || true
        find target/${{ matrix.target }}/release/deps -name "libonnxruntime*${{ matrix.asset_ext }}*" -exec cp {} dist/lib/ \; || true
        find target/${{ matrix.target }}/release/build -name "libonnxruntime*${{ matrix.asset_ext }}*" -exec cp {} dist/lib/ \; || true
        
        # Create archive
        cd dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          7z a ../${{ matrix.artifact_name }}.zip *
        else
          tar -czvf ../${{ matrix.artifact_name }}.tar.gz *
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          ${{ matrix.artifact_name }}.tar.gz
          ${{ matrix.artifact_name }}.zip

  publish-release:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
    
    - name: Display downloaded artifacts
      run: ls -R

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: 'Release ${{ github.ref_name }}'
        files: |
          */*.tar.gz
          */*.zip
        generate_release_notes: true
