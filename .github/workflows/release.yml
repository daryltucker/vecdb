name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vecdb-linux-amd64
            asset_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vecdb-windows-amd64
            asset_ext: ".exe"
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vecdb-macos-arm64
            asset_ext: ""

    steps:
    - uses: actions/checkout@v3

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Prepare Artifacts for Upload
      shell: bash
      run: |
        mkdir -p dist
        # Copy binaries
        cp target/${{ matrix.target }}/release/vecdb${{ matrix.asset_ext }} dist/
        cp target/${{ matrix.target }}/release/vecdb-server${{ matrix.asset_ext }} dist/
        cp target/${{ matrix.target }}/release/vecq${{ matrix.asset_ext }} dist/
        
        # Create archive
        cd dist
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          7z a ../${{ matrix.artifact_name }}.zip *
        else
          tar -czvf ../${{ matrix.artifact_name }}.tar.gz *
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          ${{ matrix.artifact_name }}.tar.gz
          ${{ matrix.artifact_name }}.zip

  publish-release:
    name: Publish Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v3
    
    - name: Display downloaded artifacts
      run: ls -R

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          */*.tar.gz
          */*.zip
        generate_release_notes: true
