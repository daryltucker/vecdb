name: vecdb

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vecdb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      # Secure Qdrant with an API Key (Optional)
      # - QDRANT__SERVICE__API_KEY=change_me_to_a_secure_key
    volumes:
      - vecdb-data:/qdrant/storage
    restart: unless-stopped

# Uncomment if you want Ollama and don't already have one
  # ollama:
