  #   ports:
  #     - "11434:11434"
  #   environment:
  #     - CUDA_VISIBLE_DEVICES=all
  #     - CUDA_DEVICE_ORDER=PCI_BUS_ID
  #   volumes:
  #   - ollama-data:/root/.ollama


volumes:
  vecdb-data:
